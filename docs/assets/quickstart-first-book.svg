<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#fffaf5"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Erstes Hoerbuch in 5 Schritten</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="130" width="200" height="120" rx="18" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <text x="170" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">1. Profil</text>
    <text x="170" y="212" text-anchor="middle" font-size="17" fill="#7c2d12">approved waehlen</text>

    <rect x="290" y="130" width="200" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="390" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">2. Quelle</text>
    <text x="390" y="212" text-anchor="middle" font-size="17" fill="#1e3a8a">TXT / PDF / EPUB</text>

    <rect x="510" y="130" width="200" height="120" rx="18" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
    <text x="610" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">3. Analyse</text>
    <text x="610" y="212" text-anchor="middle" font-size="17" fill="#14532d">Kapitel ja / nein</text>

    <rect x="730" y="130" width="200" height="120" rx="18" fill="#ffffff" stroke="#ddd6fe" stroke-width="2"/>
    <text x="830" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">4. Start</text>
    <text x="830" y="212" text-anchor="middle" font-size="17" fill="#5b21b6">Queue oder sofort</text>

    <rect x="950" y="130" width="180" height="120" rx="18" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>
    <text x="1040" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#be123c">5. Export</text>
    <text x="1040" y="212" text-anchor="middle" font-size="17" fill="#9f1239">MP3 + Manifest</text>

    <text x="70" y="345" font-size="22" font-weight="700" fill="#0f172a">Ausgabearten</text>
    <text x="70" y="385" font-size="18" fill="#334155">• Eine Gesamtdatei</text>
    <text x="70" y="420" font-size="18" fill="#334155">• Eine Datei pro Kapitel (nur wenn Kapitel erkannt wurden)</text>
    <text x="70" y="455" font-size="18" fill="#334155">• Mehrere Dateien nach Zeit</text>
  </g>
</svg>
