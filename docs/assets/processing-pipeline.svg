<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="640" viewBox="0 0 1400 640">
  <rect width="1400" height="640" fill="#fffdf8"/>
  <text x="70" y="74" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#111827">Verarbeitungspipeline</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">So wird aus einem Dokument ein wiederaufnahmefähiges Hörbuch.</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="170" width="220" height="110" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="180" y="218" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">1. Import</text>
    <text x="180" y="252" text-anchor="middle" font-size="16" fill="#4b5563">TXT, PDF, EPUB</text>

    <rect x="340" y="170" width="220" height="110" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="450" y="218" text-anchor="middle" font-size="24" font-weight="700" fill="#9a3412">2. Analyse</text>
    <text x="450" y="252" text-anchor="middle" font-size="16" fill="#7c2d12">Kapitel, Struktur, Exportoptionen</text>

    <rect x="610" y="170" width="220" height="110" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="720" y="218" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">3. Profil</text>
    <text x="720" y="252" text-anchor="middle" font-size="16" fill="#1e3a8a">approved Produktionseinstellungen</text>

    <rect x="880" y="170" width="220" height="110" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="990" y="218" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">4. Chunking</text>
    <text x="990" y="252" text-anchor="middle" font-size="16" fill="#14532d">Texte in stabile Schnipsel</text>

    <rect x="1150" y="170" width="180" height="110" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="1240" y="218" text-anchor="middle" font-size="24" font-weight="700" fill="#6d28d9">5. TTS</text>
    <text x="1240" y="252" text-anchor="middle" font-size="16" fill="#5b21b6">Piper oder XTTS</text>

    <rect x="260" y="380" width="250" height="110" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="385" y="428" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">6. Nacharbeit</text>
    <text x="385" y="462" text-anchor="middle" font-size="16" fill="#4b5563">MP3-Konvertierung, Retry, Queue</text>

    <rect x="580" y="380" width="250" height="110" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="705" y="428" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">7. Zusammenführung</text>
    <text x="705" y="462" text-anchor="middle" font-size="16" fill="#4b5563">Kapitel, Zeitteile oder Gesamtdatei</text>

    <rect x="900" y="380" width="270" height="110" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="1035" y="428" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">8. Export & Metadaten</text>
    <text x="1035" y="462" text-anchor="middle" font-size="16" fill="#4b5563">ID3, manifest.json, chapters.json</text>

    <path d="M290 225 L340 225" stroke="#94a3b8" stroke-width="6" fill="none"/>
    <path d="M560 225 L610 225" stroke="#94a3b8" stroke-width="6" fill="none"/>
    <path d="M830 225 L880 225" stroke="#94a3b8" stroke-width="6" fill="none"/>
    <path d="M1100 225 L1150 225" stroke="#94a3b8" stroke-width="6" fill="none"/>
    <path d="M1240 280 L1240 330 L385 330 L385 380" stroke="#94a3b8" stroke-width="6" fill="none"/>
    <path d="M510 435 L580 435" stroke="#94a3b8" stroke-width="6" fill="none"/>
    <path d="M830 435 L900 435" stroke="#94a3b8" stroke-width="6" fill="none"/>
  </g>
</svg>
