name: Portable Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build helpers
        run: python3 -m pip install -U pip requests

      - name: Build Linux portable release
        run: python3 scripts/build_linux_portable_release.py dist/book2mp3-linux-portable --archive

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: book2mp3-linux-portable
          path: dist/book2mp3-linux-portable.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build helpers
        run: python3 -m pip install -U pip requests

      - name: Build Windows portable release
        run: python3 scripts/build_windows_portable_release.py dist/book2mp3-windows-portable --archive

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: book2mp3-windows-portable
          path: dist/book2mp3-windows-portable.zip

  publish-continuous-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: book2mp3-linux-portable
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: book2mp3-windows-portable
          path: release

      - name: Publish rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Portable Build
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release/book2mp3-linux-portable.tar.gz
            release/book2mp3-windows-portable.zip
          body: |
            Rolling portable build for commit `${{ github.sha }}`.

            This release is meant for direct end-user testing.
            Piper is bundled and ready to use.
            Each archive contains a `START_HERE.md` guide for end users.
            XTTS remains optional and may require an extra setup step (`start.sh --install-xtts` / `start.bat --install-xtts`) and separate license review.
          overwrite_files: true
