name: Portable Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portable-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python3 -m pip install -U pip
          python3 -m pip install -e .

      - name: Bootstrap Linux Piper runtime and release voices
        run: python3 scripts/bootstrap_runtime.py --piper-platform linux --release-voice-pack

      - name: Build Linux portable archive
        run: |
          python3 scripts/build_linux_portable_release.py \
            dist/book2mp3-linux-portable \
            --archive \
            --include-xtts-starter-profiles

      - name: Write Linux checksum
        run: |
          cd dist
          sha256sum book2mp3-linux-portable.tar.gz > book2mp3-linux-portable.tar.gz.sha256

      - name: Upload Linux portable download
        uses: actions/upload-artifact@v4
        with:
          name: book2mp3-linux-portable
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/book2mp3-linux-portable.tar.gz
            dist/book2mp3-linux-portable.tar.gz.sha256

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build helpers
        run: python3 -m pip install -U pip requests

      - name: Bootstrap Windows Piper runtime and release voices
        run: python3 scripts/bootstrap_runtime.py --piper-platform windows --release-voice-pack

      - name: Build Windows portable archive
        run: |
          python3 scripts/build_windows_portable_release.py \
            dist/book2mp3-windows-portable \
            --archive \
            --include-xtts-starter-profiles

      - name: Write Windows checksum
        run: |
          cd dist
          sha256sum book2mp3-windows-portable.zip > book2mp3-windows-portable.zip.sha256

      - name: Upload Windows portable download
        uses: actions/upload-artifact@v4
        with:
          name: book2mp3-windows-portable
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/book2mp3-windows-portable.zip
            dist/book2mp3-windows-portable.zip.sha256

  publish-continuous-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Linux portable download
        uses: actions/download-artifact@v4
        with:
          name: book2mp3-linux-portable
          path: release

      - name: Download Windows portable download
        uses: actions/download-artifact@v4
        with:
          name: book2mp3-windows-portable
          path: release

      - name: Write combined checksums
        run: |
          cd release
          sha256sum book2mp3-linux-portable.tar.gz book2mp3-windows-portable.zip > SHA256SUMS.txt

      - name: Publish rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Portable Build
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release/book2mp3-linux-portable.tar.gz
            release/book2mp3-linux-portable.tar.gz.sha256
            release/book2mp3-windows-portable.zip
            release/book2mp3-windows-portable.zip.sha256
            release/SHA256SUMS.txt
          body: |
            Rolling portable build for commit `${{ github.sha }}`.

            Downloads:
            - `book2mp3-linux-portable.tar.gz` for Linux
            - `book2mp3-windows-portable.zip` for Windows
            - `SHA256SUMS.txt` for checksum verification

            Each archive includes an app-local Python runtime, Piper runtime for its platform, a compact multilingual Piper voice pack, starter XTTS speaker profiles, and a `START_HERE.md` guide.

            XTTS remains optional and may require an extra setup step (`start.sh --install-xtts` / `start.bat --install-xtts`) and separate license review.
          overwrite_files: true

  publish-versioned-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux portable download
        uses: actions/download-artifact@v4
        with:
          name: book2mp3-linux-portable
          path: release

      - name: Download Windows portable download
        uses: actions/download-artifact@v4
        with:
          name: book2mp3-windows-portable
          path: release

      - name: Write combined checksums
        run: |
          cd release
          sha256sum book2mp3-linux-portable.tar.gz book2mp3-windows-portable.zip > SHA256SUMS.txt

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: book2mp3 ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            release/book2mp3-linux-portable.tar.gz
            release/book2mp3-linux-portable.tar.gz.sha256
            release/book2mp3-windows-portable.zip
            release/book2mp3-windows-portable.zip.sha256
            release/SHA256SUMS.txt
          body: |
            Portable book2mp3 release for `${{ github.ref_name }}`.

            Downloads:
            - `book2mp3-linux-portable.tar.gz` for Linux
            - `book2mp3-windows-portable.zip` for Windows
            - `SHA256SUMS.txt` for checksum verification

            Each archive includes an app-local Python runtime, Piper runtime for its platform, a compact multilingual Piper voice pack, starter XTTS speaker profiles, and a `START_HERE.md` guide.

            XTTS remains optional and may require an extra setup step (`start.sh --install-xtts` / `start.bat --install-xtts`) and separate license review.
          overwrite_files: true
